  <!-- Robot Head -->
  <rect x="14" y="20" width="22" height="18" rx="4" fill="white"/>
  
  <!-- Eyes -->
  <circle cx="20" cy="29" r="2" fill="#4E6BFF"/>
  <circle cx="30" cy="29" r="2" fill="#4E6BFF"/>
  
  <!-- Antenna -->
  <line x1="25" y1="20" x2="25" y2="15" stroke="white" stroke-width="2"/>
  <circle cx="25" cy="13" r="2" fill="white"/>
  
  <!-- Text closer to box, bolder, letter spacing -->
  <text x="52" y="38" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="white" font-weight="700" letter-spacing="1">
    HireBotx
